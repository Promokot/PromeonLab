<svg viewBox="0 0 1280 820" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Helvetica Neue',Arial,sans-serif">
  <title>Функциональная схема приложения PromeonLab</title>
  <desc>Пять подсистем (файловые ресурсы как центральный узел, формирование сцен, анимация, ограничители и скелетные структуры, экспорт) и две сквозные прослойки — пространственный UI и VR-взаимодействие.</desc>
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#355CA8"/><stop offset="0.55" stop-color="#3772B3"/><stop offset="1" stop-color="#5FC1CF"/>
    </linearGradient>
    <marker id="ah" markerWidth="11" markerHeight="11" refX="8.5" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#006A81"/></marker>
    <marker id="ahs" markerWidth="11" markerHeight="11" refX="0.5" refY="4" orient="auto"><path d="M9,0 L0,4 L9,8 Z" fill="#006A81"/></marker>
  </defs>

  <rect x="0" y="0" width="1280" height="820" fill="#ffffff"/>

  <g stroke="#006A81" stroke-width="2.5" fill="none" marker-start="url(#ahs)" marker-end="url(#ah)">
    <line x1="670" y1="120" x2="670" y2="190"/>
    <line x1="670" y1="274" x2="670" y2="360"/>
    <line x1="520" y1="402" x2="400" y2="402"/>
    <polyline points="320,360 320,232 520,232"/>
    <polyline points="680,562 980,562 980,232 820,232"/>
  </g>
  <g stroke="#006A81" stroke-width="2.5" fill="none">
    <line x1="530" y1="520" x2="530" y2="480"/>
    <line x1="300" y1="480" x2="620" y2="480"/>
    <line x1="300" y1="480" x2="300" y2="444" marker-end="url(#ah)"/>
    <line x1="620" y1="480" x2="620" y2="444" marker-end="url(#ah)"/>
  </g>

  <rect x="520" y="48" width="300" height="72" rx="14" fill="#EEF3FB" stroke="#355CA8" stroke-width="1.5"/>
  <text x="670" y="90" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">Подсистема экспорта данных</text>

  <rect x="520" y="190" width="300" height="84" rx="14" fill="#EAF4F6" stroke="#006A81" stroke-width="2.6"/>
  <text x="670" y="226" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">Подсистема управления</text>
  <text x="670" y="252" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">файловыми ресурсами</text>

  <rect x="520" y="360" width="300" height="84" rx="14" fill="#ffffff" stroke="#006A81" stroke-width="1.6"/>
  <text x="670" y="396" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">Подсистема формирования</text>
  <text x="670" y="422" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">и редактирования сцен</text>

  <rect x="120" y="360" width="280" height="84" rx="14" fill="#ffffff" stroke="#006A81" stroke-width="1.6"/>
  <text x="260" y="408" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">Подсистема анимации</text>

  <rect x="380" y="520" width="300" height="84" rx="14" fill="#ffffff" stroke="#006A81" stroke-width="1.6"/>
  <text x="530" y="556" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">Подсистема ограничителей</text>
  <text x="530" y="582" text-anchor="middle" font-size="19" font-weight="700" fill="#355CA8">и скелетных структур</text>

  <text x="120" y="648" font-size="16" font-weight="700" fill="#006A81" letter-spacing="0.5">Сквозные прослойки — общие для всех подсистем</text>
  <rect x="120" y="664" width="1040" height="58" rx="12" fill="url(#band)"/>
  <text x="145" y="699" font-size="20" font-weight="700" fill="#ffffff">Пространственный UI</text>
  <text x="430" y="699" font-size="17" fill="#EAF4F6">панели · навбар · билборды</text>
  <rect x="120" y="730" width="1040" height="58" rx="12" fill="url(#band)"/>
  <text x="145" y="765" font-size="20" font-weight="700" fill="#ffffff">VR-взаимодействие</text>
  <text x="430" y="765" font-size="17" fill="#EAF4F6">контроллеры · перемещение / телепорт · гизмо</text>

  <g stroke="#94CCD9" stroke-width="2" stroke-dasharray="3 6" fill="none">
    <line x1="260" y1="604" x2="260" y2="664"/>
    <line x1="670" y1="604" x2="670" y2="664"/>
    <line x1="980" y1="590" x2="980" y2="664"/>
  </g>
</svg>
